name: CI - Build e Validação

on:
  schedule:
    - cron: '0 8 */5 * *'  # Roda a cada 5 dias às 8h UTC (Supabase keep-alive)
  push:
    branches:
      - develop
  pull_request:
    branches:
      - main

jobs:
  build-backend:
    name: Build Backend (.NET 8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependências
        run: dotnet restore Portfolio.sln

      - name: Build
        run: dotnet build Portfolio.sln --no-restore --configuration Release

  test-quality-gate:
    name: Testes e Quality Gate (cobertura mínima 80%)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependências
        run: dotnet restore Portfolio.sln

      - name: Rodar testes com cobertura
        run: |
          dotnet test tests/Portfolio.UnitTests/Portfolio.UnitTests.csproj \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:CoverletOutput=./coverage/coverage.xml \
            /p:Threshold=80 \
            /p:ThresholdType=method \
            /p:ThresholdStat=total

      - name: Publicar relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: tests/Portfolio.UnitTests/coverage/coverage.xml

      - name: Rodar testes de integracao
        run: dotnet test tests/Portfolio.IntegrationTests/Portfolio.IntegrationTests.csproj

  build-frontend:
    name: Build Frontend (Blazor WASM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restaurar dependências
        run: dotnet restore src/Portfolio.Web/Portfolio.Web.csproj

      - name: Build Release
        run: dotnet build src/Portfolio.Web/Portfolio.Web.csproj --no-restore --configuration Release

      - name: Publish
        run: dotnet publish src/Portfolio.Web/Portfolio.Web.csproj --no-build --configuration Release --output ./publish/web

  keep-alive:
    name: Keep-alive API e Supabase
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Ping API e banco
        run: |
          curl -f https://wpdev-portfolio-api.onrender.com/api/health || echo "API não respondeu"

      - name: Ping Frontend
        run: |
          curl -f https://wpdev-portfolio-web.onrender.com || echo "Frontend não respondeu"