<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WPDev - Portfolio</title>
    <meta name="description" content="Portfólio de William, desenvolvedor Full Stack especializado em .NET, Blazor WebAssembly e arquitetura de software. Projetos, blog técnico e timeline de carreira." />
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png" />
    <link href="Portfolio.Web.styles.css" rel="stylesheet" />

    <!-- Google Fonts: Poppins + Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ================================
        LOADING SCREEN - WPDev
        ================================ */

        /* Loader ocupa a tela inteira enquanto o Blazor inicializa */
        .wpdev-loader-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #0D1C24;
            font-family: 'Poppins', sans-serif;
        }

        .wpdev-loader-brand {
            font-family: 'Poppins', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: #F4F7F7;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
        }

        .wpdev-loader-brand-img {
            height: clamp(80px, 15vw, 106px);
            width: auto;
            max-width: 60vw;
            margin-bottom: 2rem;
            filter: brightness(0) invert(1);
        }

        .wpdev-loader-brand span {
            color: #6C9EA3;
        }

        .wpdev-loader-bar {
            width: 120px;
            height: 2px;
            background: rgba(244, 247, 247, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .wpdev-loader-bar::after {
            content: '';
            display: block;
            height: 100%;
            width: 40%;
            background: #6C9EA3;
            border-radius: 2px;
            animation: wpdev-slide 1.4s ease-in-out infinite;
        }

        @keyframes wpdev-slide {
            0%   { transform: translateX(-100%); }
            50%  { transform: translateX(200%); }
            100% { transform: translateX(200%); }
        }

        .loading-progress,
        .loading-progress-text {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="app">
        <svg class="loading-progress" style="display:none">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text" style="display:none"></div>

        <!-- Loader com fundo próprio, não contamina o #app -->
        <div class="wpdev-loader-screen">
            <img src="/images/wpdev-logo.webp" alt="WPDev" class="wpdev-loader-brand-img" />
            <div class="wpdev-loader-bar"></div>
        </div>
    </div>

    <div id="blazor-error-ui" style="display: none; position: fixed; bottom: 0; left: 0; width: 100%; padding: 0.6rem 1.25rem 0.7rem 1.25rem; background: #fff3cd; color: #856404; box-shadow: 0 -1px 2px rgba(0, 0, 0, 0.2); z-index: 1000;">
        Ocorreu um erro inesperado.
        <a href="" class="reload" style="margin-left: 0.5rem; color: #856404; text-decoration: underline;">Recarregar</a>
        <a class="dismiss" style="position: absolute; right: 0.75rem; top: 0.5rem; cursor: pointer;">🗙</a>
    </div>

    <script src="_framework/blazor.webassembly.js"></script>

    <script>
        window.cloudinaryUploadBytes = async function (base64Data, fileName, contentType, cloudName, uploadPreset) {
            try {
                const byteCharacters = atob(base64Data);
                const byteArray = new Uint8Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteArray[i] = byteCharacters.charCodeAt(i);
                }
                const blob = new Blob([byteArray], { type: contentType });
                const formData = new FormData();
                formData.append('file', blob, fileName);
                formData.append('upload_preset', uploadPreset);

                const response = await fetch(
                    `https://api.cloudinary.com/v1_1/${cloudName}/image/upload`,
                    { method: 'POST', body: formData }
                );

                if (!response.ok) {
                    const err = await response.text();
                    console.error('[Cloudinary] Erro:', err);
                    return null;
                }

                const data = await response.json();
                return data.secure_url ?? null;
            } catch (ex) {
                console.error('[Cloudinary] Exceção:', ex);
                return null;
            }
        };

        window.setupImageUpload = function (inputId, previewId, dotNetRef, cloudName, uploadPreset) {
            const input = document.getElementById(inputId);
            if (!input) {
                console.error('[ImageUpload] Input não encontrado:', inputId);
                return;
            }

            console.log('[ImageUpload] Setup OK para:', inputId);

            input.addEventListener('change', async function () {
                const file = input.files[0];
                if (!file) return;

                console.log('[ImageUpload] Arquivo selecionado:', file.name);

                const reader = new FileReader();
                reader.onload = async function (e) {
                    const base64 = e.target.result.split(',')[1];
                    const url = await window.cloudinaryUploadBytes(
                        base64, file.name, file.type, cloudName, uploadPreset);

                    console.log('[ImageUpload] URL retornada:', url);

                    if (url) {
                        const preview = document.getElementById(previewId);
                        if (preview) {
                            preview.src = url;
                            preview.style.display = 'block';
                            preview.style.width = '100%';
                            preview.style.height = '160px';
                            preview.style.objectFit = 'cover';
                            preview.style.borderRadius = '8px';
                            preview.style.marginBottom = '8px';
                            // Esconde após 2s quando Blazor assumir o preview
                            setTimeout(() => { preview.style.display = 'none'; }, 2000);
                        }

                        // Notifica o Blazor diretamente via DotNetObjectReference
                        try {
                            await dotNetRef.invokeMethodAsync('OnImageUploaded', url);
                            console.log('[ImageUpload] Blazor notificado com URL:', url);
                        } catch (err) {
                            console.error('[ImageUpload] Erro ao notificar Blazor:', err);
                        }
                    }
                };
                reader.readAsDataURL(file);
            });
        };
        
        window.setupScrollReveal = function () {
            const elements = document.querySelectorAll('.scroll-reveal');
            if (elements.length === 0) return;

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('scroll-reveal--visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, {
                threshold: 0.15,
                rootMargin: '0px 0px -40px 0px'
            });

            elements.forEach(el => observer.observe(el));
        };

        window.loadHeroVideo = function (sourceId, videoUrl) {
            const source = document.getElementById(sourceId);
            if (source) {
                const video = source.parentElement;
                source.src = videoUrl;
                video.load();
            }
        };
    </script>
</body>

</html>
